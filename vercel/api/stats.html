<!DOCTYPE html>
<html>
<head>
    <title>GitHub Stats for {username}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: min(90vw, 1800px); /* Increase max-width but limit by viewport percentage */
            margin: 2rem auto;
            padding: 0 1rem;
            line-height: 1.5;
            color: #24292e;
        }
        h1 {
            margin: 1.5rem 0 0.5rem;
        }
        h2 {
            margin: 0 0 0.75rem;
            color: #2f363d;
            font-size: 1.2rem;
        }
        .embed-card {
            border-radius: 8px;
            background: #f6f8fa;
            margin: 0.75rem 0 1.25rem;
            padding: 0.5rem;
        }
        .embed-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }
        .format-tabs {
            display: inline-flex;
            gap: 0.125rem;
            padding: 0.125rem;
            border-radius: 6px;
            background: #eaeef2;
        }
        .format-tab,
        .copy-button {
            border: 0;
            border-radius: 4px;
            cursor: pointer;
            font: inherit;
            font-size: 0.85rem;
            line-height: 1;
        }
        .format-tab {
            background: transparent;
            color: #57606a;
            padding: 0.45rem 0.65rem;
        }
        .format-tab[aria-pressed="true"] {
            background: #0969da;
            color: #ffffff;
        }
        .copy-button {
            background: #24292e;
            color: #ffffff;
            padding: 0.575rem 0.8rem;
            min-width: 4.5rem;
        }
        .copy-button:hover {
            background: #000000;
        }
        .format-tab:focus-visible,
        .copy-button:focus-visible {
            outline: 2px solid #0969da;
            outline-offset: 2px;
        }
        .snippet-box {
            margin: 0;
            padding: 0.75rem;
            min-height: 3.25rem;
            overflow-x: auto;
            background: #ffffff;
            border-radius: 6px;
            color: #24292e;
            font-family: ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.85rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .copy-state {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .svg-container {
            position: relative;
            max-width: 100%;
            min-height: 280px;
            overflow: auto;
            border-radius: 8px;
            background: #f6f8fa;
        }
        .svg-container[data-state="loading"],
        .svg-container[data-state="error"] {
            display: grid;
            place-items: center;
            padding: 1rem;
        }
        .svg-container[data-state="loaded"] {
            padding: 0;
            background: transparent;
        }
        .svg-container > svg {
            display: block;
            width: 100%;
            min-width: 720px;
            height: auto;
        }
        .svg-status {
            display: grid;
            justify-items: center;
            gap: 0.75rem;
            text-align: center;
            color: #6a737d;
        }
        .svg-status strong {
            display: block;
            color: #24292e;
            font-size: 0.95rem;
            margin-bottom: 0.125rem;
        }
        .spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid #d0d7de;
            border-top-color: #0969da;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .retry-button {
            border: 0;
            border-radius: 6px;
            background: #eaeef2;
            color: #24292e;
            cursor: pointer;
            font: inherit;
            font-size: 0.9rem;
            padding: 0.45rem 0.8rem;
        }
        .retry-button:hover {
            background: #eaeef2;
        }
        .retry-button:focus-visible {
            outline: 2px solid #0969da;
            outline-offset: 2px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .top-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .github-button {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background-color: #24292e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }
        .github-button:hover {
            background-color: #000;
        }
        .github-button:focus-visible,
        a:focus-visible {
            outline: 2px solid #0969da;
            outline-offset: 2px;
        }
        .github-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        a {
            color: #0366d6;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }
        .stats-column {
            min-width: 0;
            width: 100%;
        }
        /* Responsive adjustments */
        @media (min-width: 1800px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 3rem;
            }
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
            body {
                margin: 1rem auto;
            }
            .top-buttons {
                margin-bottom: 1.5rem;
                flex-direction: column;
                align-items: flex-start;
            }
            h1 {
                font-size: 1.5rem;
                margin-top: 1rem;
            }
        }
        @media (max-width: 480px) {
            body {
                padding: 0 0.75rem;
            }
            .embed-toolbar {
                align-items: stretch;
                flex-direction: column;
            }
            .format-tabs {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                width: 100%;
            }
            .copy-button {
                width: 100%;
            }
            .snippet-box {
                font-size: 0.8rem;
            }
        }
    </style>
    <script>
        function renderLoading(container, label) {
            container.dataset.state = 'loading';
            container.setAttribute('aria-busy', 'true');
            container.innerHTML = `
                <div class="svg-status" role="status" aria-live="polite">
                    <span class="spinner" aria-hidden="true"></span>
                    <span>
                        <strong>Loading ${label}</strong>
                        <span>Fetching the SVG...</span>
                    </span>
                </div>
            `;
        }

        function renderError(container, label, retry) {
            container.dataset.state = 'error';
            container.removeAttribute('aria-busy');
            container.innerHTML = `
                <div class="svg-status" role="alert">
                    <strong>Could not load ${label}</strong>
                    <span>Check the username or try again.</span>
                    <button class="retry-button" type="button">Retry</button>
                </div>
            `;
            container.querySelector('button').addEventListener('click', retry);
        }

        async function loadSVG(url, containerId, label) {
            const container = document.getElementById(containerId);
            renderLoading(container, label);

            try {
                const response = await fetch(url, { headers: { Accept: 'image/svg+xml' } });
                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }
                const svgText = await response.text();
                if (!svgText.trim().startsWith('<svg')) {
                    throw new Error('Response was not an SVG document');
                }
                container.innerHTML = svgText;
                container.dataset.state = 'loaded';
                container.removeAttribute('aria-busy');

                const svg = container.querySelector('svg');
                if (svg && !svg.getAttribute('aria-label')) {
                    svg.setAttribute('role', 'img');
                    svg.setAttribute('aria-label', label);
                }
            } catch (error) {
                console.error('Error loading SVG:', error);
                renderError(container, label, () => loadSVG(url, containerId, label));
            }
        }

        function escapeHtmlAttribute(value) {
            return value.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        }

        function getSnippet(card, format) {
            const url = card.dataset.url;
            const label = card.dataset.label;
            if (format === 'html') {
                return `<a href="${escapeHtmlAttribute(url)}">${label}</a>`;
            }
            if (format === 'url') {
                return url;
            }
            return `![${label}](${url})`;
        }

        function updateSnippet(card, format) {
            const selectedFormat = format || card.dataset.format || 'markdown';
            card.dataset.format = selectedFormat;
            card.querySelector('code').textContent = getSnippet(card, selectedFormat);

            card.querySelectorAll('.format-tab').forEach((tab) => {
                const selected = tab.dataset.format === selectedFormat;
                tab.setAttribute('aria-pressed', selected ? 'true' : 'false');
            });

            const copyButton = card.querySelector('.copy-button');
            copyButton.textContent = 'Copy';
            card.querySelector('.copy-state').textContent = '';
        }

        function selectFormat(button) {
            updateSnippet(button.closest('.embed-card'), button.dataset.format);
        }

        function setupSnippetCards() {
            document.querySelectorAll('.embed-card').forEach((card) => {
                updateSnippet(card, card.dataset.format);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            setupSnippetCards();
            loadSVG('{created_url}', 'created-svg', 'created repositories');
            loadSVG('{contributed_url}', 'contributed-svg', 'contributed repositories');
        });

        async function copySnippet(button) {
            const card = button.closest('.embed-card');
            const text = card.querySelector('code').textContent.trim();
            const state = card.querySelector('.copy-state');

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.setAttribute('readonly', '');
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    textarea.remove();
                }
                button.textContent = 'Copied';
                state.textContent = 'Copied';
                setTimeout(() => {
                    button.textContent = 'Copy';
                    state.textContent = '';
                }, 2000);
            } catch (error) {
                console.error('Error copying snippet:', error);
                button.textContent = 'Failed';
                state.textContent = 'Copy failed';
            }
        }
    </script>
</head>
<body>
    <div class="top-buttons">
        <a href="/">← Generate for another user</a>
        <a href="https://github.com/j178/github-contrib-stats" class="github-button" target="_blank" rel="noopener noreferrer">
            <svg class="github-icon" viewBox="0 0 16 16" version="1.1" aria-hidden="true">
                <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
            </svg>
            Star on GitHub
        </a>
    </div>

    <h1>GitHub Stats for <a href="https://github.com/{username}">{username}</a></h1>
    <div class="stats-grid">
        <div class="stats-column">
            <h2>Created Repositories</h2>
            <div class="embed-card" data-format="markdown" data-url="{created_url}" data-label="Repos I created">
                <div class="embed-toolbar">
                    <div class="format-tabs" role="group" aria-label="Created repositories snippet format">
                        <button type="button" class="format-tab" data-format="markdown" aria-pressed="true" onclick="selectFormat(this)">Markdown</button>
                        <button type="button" class="format-tab" data-format="html" aria-pressed="false" onclick="selectFormat(this)">HTML</button>
                        <button type="button" class="format-tab" data-format="url" aria-pressed="false" onclick="selectFormat(this)">URL</button>
                    </div>
                    <button type="button" class="copy-button" onclick="copySnippet(this)">Copy</button>
                </div>
                <pre class="snippet-box"><code></code></pre>
                <span class="copy-state" aria-live="polite"></span>
            </div>
            <div id="created-svg" class="svg-container" data-state="loading" aria-busy="true">
            </div>
        </div>
        
        <div class="stats-column">
            <h2>Contributed Repositories</h2>
            <div class="embed-card" data-format="markdown" data-url="{contributed_url}" data-label="Repos I contributed to">
                <div class="embed-toolbar">
                    <div class="format-tabs" role="group" aria-label="Contributed repositories snippet format">
                        <button type="button" class="format-tab" data-format="markdown" aria-pressed="true" onclick="selectFormat(this)">Markdown</button>
                        <button type="button" class="format-tab" data-format="html" aria-pressed="false" onclick="selectFormat(this)">HTML</button>
                        <button type="button" class="format-tab" data-format="url" aria-pressed="false" onclick="selectFormat(this)">URL</button>
                    </div>
                    <button type="button" class="copy-button" onclick="copySnippet(this)">Copy</button>
                </div>
                <pre class="snippet-box"><code></code></pre>
                <span class="copy-state" aria-live="polite"></span>
            </div>
            <div id="contributed-svg" class="svg-container" data-state="loading" aria-busy="true">
            </div>
        </div>
    </div>
</body>
</html>

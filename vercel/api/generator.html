<!DOCTYPE html>
<html lang="en">
<head>
    <title>GitHub Contribution Stats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            color-scheme: light;
            --bg: #ffffff;
            --surface: #f6f8fa;
            --surface-strong: #eef2f6;
            --text: #24292f;
            --muted: #57606a;
            --line: #d8dee4;
            --accent: #0969da;
            --accent-strong: #0550ae;
            --success: #1f883d;
            --danger: #cf222e;
            --shadow: 0 16px 40px rgba(31, 35, 40, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.5;
        }

        button,
        input {
            font: inherit;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .page {
            width: min(94vw, 1760px);
            margin: 0 auto;
            padding: 1.5rem 0 3rem;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        h1 {
            margin: 0;
            color: var(--text);
            font-size: clamp(1.55rem, 2.5vw, 2.25rem);
            font-weight: 750;
            letter-spacing: 0;
        }

        h2 {
            margin: 0 0 0.75rem;
            color: var(--text);
            font-size: 1.05rem;
            font-weight: 700;
        }

        .github-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            min-height: 2.4rem;
            padding: 0.5rem 0.8rem;
            border-radius: 6px;
            background: #24292f;
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .github-button:hover {
            background: #000000;
            text-decoration: none;
        }

        .github-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .generator {
            display: grid;
            grid-template-columns: minmax(240px, 1fr) minmax(520px, 0.95fr) auto;
            gap: 0.75rem;
            align-items: stretch;
            margin-bottom: 1.4rem;
            padding: 1rem;
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .field {
            min-width: 0;
        }

        .generator > .field {
            display: grid;
            align-content: end;
        }

        .generator-actions {
            display: flex;
            align-items: end;
            gap: 0.55rem;
        }

        .filter-controls {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.55rem;
            align-items: end;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            margin-bottom: 0.35rem;
        }

        .field label {
            display: block;
            margin-bottom: 0.35rem;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .label-row label {
            margin-bottom: 0;
        }

        .filter-field .label-row {
            margin-bottom: 0.25rem;
        }

        .filter-field label {
            font-size: 0.72rem;
        }

        .help-tip {
            position: relative;
            display: inline-grid;
            width: 0.85rem;
            height: 0.85rem;
            place-items: center;
            border-radius: 50%;
            background: transparent;
            color: var(--muted);
            cursor: help;
            line-height: 1;
            opacity: 0.42;
            text-transform: none;
            transition: color 0.12s ease, opacity 0.12s ease;
        }

        .help-tip:hover,
        .help-tip:focus-visible {
            color: var(--accent);
            opacity: 0.9;
        }

        .help-tip-icon {
            width: 0.8rem;
            height: 0.8rem;
            stroke: currentColor;
            stroke-width: 1.7;
        }

        .help-tip::after {
            position: absolute;
            z-index: 20;
            bottom: calc(100% + 0.45rem);
            left: 50%;
            width: max-content;
            max-width: min(17rem, 80vw);
            padding: 0.45rem 0.55rem;
            border-radius: 6px;
            background: #24292f;
            box-shadow: var(--shadow);
            color: #ffffff;
            content: attr(data-tooltip);
            font-size: 0.78rem;
            font-weight: 500;
            line-height: 1.35;
            opacity: 0;
            pointer-events: none;
            text-align: left;
            transform: translate(-50%, 0.25rem);
            transition: opacity 0.12s ease, transform 0.12s ease;
            white-space: normal;
        }

        .help-tip::before {
            position: absolute;
            z-index: 21;
            bottom: calc(100% + 0.2rem);
            left: 50%;
            border: 0.25rem solid transparent;
            border-top-color: #24292f;
            content: "";
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 0.25rem);
            transition: opacity 0.12s ease, transform 0.12s ease;
        }

        .help-tip:hover::after,
        .help-tip:hover::before,
        .help-tip:focus-visible::after,
        .help-tip:focus-visible::before {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .field input[type="text"],
        .field input[type="number"] {
            width: 100%;
            min-height: 2.55rem;
            padding: 0.5rem 0.65rem;
            border: 1px solid transparent;
            border-radius: 6px;
            background: #ffffff;
            color: var(--text);
        }

        .filter-field input[type="number"] {
            font-variant-numeric: tabular-nums;
            text-align: right;
        }

        .field input[type="text"]:hover,
        .field input[type="number"]:hover {
            border-color: var(--line);
        }

        .generate-button,
        .copy-button,
        .retry-button {
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 700;
        }

        .generate-button {
            align-self: end;
            min-height: 2.55rem;
            padding: 0.55rem 1rem;
            background: var(--success);
            color: #ffffff;
            white-space: nowrap;
        }

        .generate-button:hover:not(:disabled) {
            background: #116329;
        }

        .generate-button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .form-error {
            grid-column: 1 / -1;
            display: none;
            margin: -0.2rem 0 0;
            color: var(--danger);
            font-size: 0.9rem;
        }

        .form-error[data-visible="true"] {
            display: block;
        }

        .empty-state {
            display: grid;
            min-height: 22rem;
            place-items: center;
            border-radius: 8px;
            background: var(--surface);
            color: var(--muted);
            text-align: center;
        }

        .empty-state strong {
            display: block;
            color: var(--text);
            font-size: 1rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 2rem;
        }

        .stats-column {
            min-width: 0;
        }

        .share-panel {
            margin: 0 0 1.35rem;
            padding: 0.65rem;
            border-radius: 8px;
            background: var(--surface);
        }

        .share-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .format-tabs {
            display: inline-flex;
            gap: 0.125rem;
            padding: 0.125rem;
            border-radius: 6px;
            background: var(--surface-strong);
        }

        .format-tab {
            border: 0;
            border-radius: 4px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font: inherit;
            font-size: 0.85rem;
            line-height: 1;
            padding: 0.45rem 0.65rem;
        }

        .format-tab[aria-pressed="true"] {
            background: var(--accent);
            color: #ffffff;
        }

        .share-button {
            min-height: 2.55rem;
            border: 0;
            border-radius: 6px;
            background: var(--surface-strong);
            color: var(--text);
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            padding: 0.55rem 1rem;
            white-space: nowrap;
        }

        .share-button:hover,
        .share-button[aria-expanded="true"] {
            background: var(--line);
        }

        .share-button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .share-list {
            display: grid;
            gap: 0.65rem;
        }

        .share-item {
            padding: 0.65rem;
            border-radius: 6px;
            background: var(--surface-strong);
        }

        .share-item-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .share-item-title {
            margin: 0;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .copy-button {
            min-width: 4.5rem;
            padding: 0.575rem 0.8rem;
            background: #24292f;
            color: #ffffff;
            font-size: 0.85rem;
            line-height: 1;
        }

        .copy-button:hover:not(:disabled) {
            background: #000000;
        }

        .copy-button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .snippet-box {
            min-height: 3.25rem;
            margin: 0;
            padding: 0.75rem;
            overflow-x: auto;
            border-radius: 6px;
            background: #ffffff;
            color: var(--text);
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.85rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .copy-state {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .svg-container {
            position: relative;
            max-width: 100%;
            min-height: 280px;
            overflow: hidden;
            border-radius: 8px;
            background: var(--surface);
        }

        .svg-container[data-state="loading"],
        .svg-container[data-state="error"],
        .svg-container[data-state="idle"] {
            display: grid;
            place-items: center;
            padding: 1rem;
        }

        .svg-container[data-state="loaded"] {
            padding: 0;
            background: transparent;
        }

        .svg-container > svg {
            display: block;
            width: 100%;
            max-width: 100%;
            min-width: 0;
            height: auto;
        }

        .svg-status {
            display: grid;
            justify-items: center;
            gap: 0.75rem;
            text-align: center;
            color: var(--muted);
        }

        .svg-status strong {
            display: block;
            color: var(--text);
            font-size: 0.95rem;
            margin-bottom: 0.125rem;
        }

        .svg-error-message {
            max-width: min(36rem, 100%);
            color: var(--danger);
            font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.82rem;
            overflow-wrap: anywhere;
        }

        .spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid var(--line);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .retry-button {
            padding: 0.45rem 0.8rem;
            background: var(--surface-strong);
            color: var(--text);
            font-size: 0.9rem;
        }

        .retry-button:hover {
            background: var(--line);
        }

        [hidden] {
            display: none !important;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1100px) {
            .generator {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .filter-controls {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 860px) {
            .page {
                width: min(94vw, 780px);
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .page {
                padding-top: 1rem;
            }

            .generator {
                grid-template-columns: 1fr;
                padding: 0.85rem;
            }

            .filter-controls {
                grid-template-columns: 1fr;
            }

            .generator-actions {
                align-items: stretch;
                flex-direction: column;
            }

            .format-tabs {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                width: 100%;
            }

            .share-toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .copy-button,
            .share-button,
            .generate-button {
                width: 100%;
            }

            .snippet-box {
                font-size: 0.8rem;
            }
        }
    </style>
    <script>
        const USERNAME_PATTERN = /^[A-Za-z0-9](?:[A-Za-z0-9-]{0,37}[A-Za-z0-9])?$/;

        function byId(id) {
            return document.getElementById(id);
        }

        function normalizeUsername(value) {
            return value.trim().replace(/^@+/, '');
        }

        function readNumberParam(id, label, min) {
            const value = byId(id).value.trim();
            if (!value) {
                return null;
            }

            const number = Number(value);
            if (!Number.isInteger(number) || number < min) {
                throw new Error(`${label} must be ${min > 0 ? 'a positive' : 'a non-negative'} integer.`);
            }
            return String(number);
        }

        function readFormParams() {
            const username = normalizeUsername(byId('username').value);
            if (!username) {
                throw new Error('Username is required.');
            }
            if (!USERNAME_PATTERN.test(username)) {
                throw new Error('Username can contain letters, numbers, and single hyphens.');
            }

            const params = new URLSearchParams({ username });
            const maxRepos = readNumberParam('max_repos', 'Top repos', 1);
            const minStars = readNumberParam('min_stars', 'Min stars', 0);
            const minForks = readNumberParam('min_forks', 'Min forks', 0);
            const minPrs = readNumberParam('min_prs', 'Min PRs', 0);

            if (maxRepos) {
                params.set('max_repos', maxRepos);
            }
            if (minStars && minStars !== '0') {
                params.set('min_stars', minStars);
            }
            if (minForks && minForks !== '0') {
                params.set('min_forks', minForks);
            }
            if (minPrs && minPrs !== '0') {
                params.set('min_prs', minPrs);
            }

            return params;
        }

        function currentParams() {
            const pathSegments = window.location.pathname.split('/').filter(Boolean);
            if (pathSegments.length !== 1) {
                return null;
            }

            let username;
            try {
                username = normalizeUsername(decodeURIComponent(pathSegments[0]));
            } catch {
                return null;
            }
            if (!username || !USERNAME_PATTERN.test(username)) {
                return null;
            }

            const params = new URLSearchParams(window.location.search);
            params.delete('show_header');
            params.set('username', username);
            return params;
        }

        function pageUrl(params) {
            const pageParams = new URLSearchParams(params);
            const username = pageParams.get('username');
            pageParams.delete('username');
            const query = pageParams.toString();
            return `${window.location.origin}/${encodeURIComponent(username)}${query ? `?${query}` : ''}`;
        }

        function svgUrl(kind, params) {
            const svgParams = new URLSearchParams(params);
            const username = svgParams.get('username');
            svgParams.delete('username');
            if (kind === 'contributed') {
                svgParams.delete('min_forks');
            } else {
                svgParams.delete('min_prs');
            }

            const query = svgParams.toString();
            return `${window.location.origin}/${encodeURIComponent(username)}/${kind}.svg${query ? `?${query}` : ''}`;
        }

        function syncForm(params) {
            byId('username').value = params?.get('username') || '';
            byId('max_repos').value = params?.get('max_repos') || '';
            byId('min_stars').value = params?.get('min_stars') || '';
            byId('min_forks').value = params?.get('min_forks') || '';
            byId('min_prs').value = params?.get('min_prs') || '';
            updateGenerateButton();
        }

        function showError(message) {
            const error = byId('form-error');
            error.textContent = message;
            error.dataset.visible = message ? 'true' : 'false';
        }

        function updateGenerateButton() {
            byId('generate-button').disabled = normalizeUsername(byId('username').value) === '';
        }

        function renderIdle() {
            const sharePanel = byId('share-panel');
            byId('empty-state').hidden = false;
            byId('result-area').hidden = true;
            sharePanel.hidden = true;
            delete sharePanel.dataset.createdUrl;
            delete sharePanel.dataset.contributedUrl;
            updateShareButton(false);
            document.title = 'GitHub Contribution Stats';
        }

        function renderLoading(container, label) {
            container.dataset.state = 'loading';
            container.setAttribute('aria-busy', 'true');
            container.innerHTML = `
                <div class="svg-status" role="status" aria-live="polite">
                    <span class="spinner" aria-hidden="true"></span>
                    <span>
                        <strong>Loading ${label}</strong>
                        <span>Fetching SVG</span>
                    </span>
                </div>
            `;
        }

        function renderError(container, label, message, retry) {
            container.dataset.state = 'error';
            container.removeAttribute('aria-busy');
            container.innerHTML = `
                <div class="svg-status" role="alert">
                    <strong>Could not load ${label}</strong>
                    <span class="svg-error-message"></span>
                    <button class="retry-button" type="button">Retry</button>
                </div>
            `;
            container.querySelector('.svg-error-message').textContent =
                message || 'Check the username or try again.';
            container.querySelector('button').addEventListener('click', retry);
        }

        function responseErrorMessage(response, body) {
            const message = body.trim();
            if (message) {
                return message;
            }
            return `Request failed with status ${response.status}`;
        }

        async function loadSVG(url, containerId, label) {
            const container = byId(containerId);
            renderLoading(container, label);

            try {
                const response = await fetch(url, { headers: { Accept: 'image/svg+xml' } });
                const svgText = await response.text();
                if (!response.ok) {
                    throw new Error(responseErrorMessage(response, svgText));
                }
                if (!svgText.trim().startsWith('<svg')) {
                    throw new Error(svgText.trim() || 'Response was not an SVG document');
                }
                container.innerHTML = svgText;
                container.dataset.state = 'loaded';
                container.removeAttribute('aria-busy');

                const svg = container.querySelector('svg');
                if (svg && !svg.getAttribute('aria-label')) {
                    svg.setAttribute('role', 'img');
                    svg.setAttribute('aria-label', label);
                }
            } catch (error) {
                console.error('Error loading SVG:', error);
                renderError(container, label, error.message, () => loadSVG(url, containerId, label));
            }
        }

        function escapeHtmlAttribute(value) {
            return value.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
        }

        function shareUrl(kind) {
            const panel = byId('share-panel');
            return kind === 'contributed' ? panel.dataset.contributedUrl : panel.dataset.createdUrl;
        }

        function shareLabel(kind) {
            return kind === 'contributed' ? 'Repos I contributed to' : 'Repos I created';
        }

        function getSnippet(kind, format) {
            const url = shareUrl(kind);
            const label = shareLabel(kind);
            if (!url) {
                return '';
            }
            if (format === 'html') {
                return `<a href="${escapeHtmlAttribute(url)}">${label}</a>`;
            }
            if (format === 'url') {
                return url;
            }
            return `![${label}](${url})`;
        }

        function updateSharePanel({ format } = {}) {
            const panel = byId('share-panel');
            const selectedFormat = format || panel.dataset.format || 'markdown';
            panel.dataset.format = selectedFormat;

            panel.querySelectorAll('.format-tab').forEach((tab) => {
                const selected = tab.dataset.format === selectedFormat;
                tab.setAttribute('aria-pressed', selected ? 'true' : 'false');
            });

            panel.querySelectorAll('.share-item').forEach((item) => {
                const kind = item.dataset.kind;
                item.querySelector('code').textContent = getSnippet(kind, selectedFormat);
                const copyButton = item.querySelector('.copy-button');
                copyButton.textContent = 'Copy';
                copyButton.disabled = !shareUrl(kind);
                item.querySelector('.copy-state').textContent = '';
            });
        }

        function updateShareButton(expanded) {
            const panel = byId('share-panel');
            const button = byId('share-button');
            const hasShareUrls = Boolean(panel.dataset.createdUrl && panel.dataset.contributedUrl);
            button.disabled = !hasShareUrls;
            button.setAttribute('aria-expanded', expanded && hasShareUrls ? 'true' : 'false');
        }

        function toggleSharePanel() {
            const panel = byId('share-panel');
            if (!panel.dataset.createdUrl || !panel.dataset.contributedUrl) {
                return;
            }
            panel.hidden = !panel.hidden;
            updateShareButton(!panel.hidden);
            updateSharePanel();
        }

        function selectFormat(button) {
            updateSharePanel({ format: button.dataset.format });
        }

        function setupSharePanel() {
            updateSharePanel();
        }

        function renderParams(params, { push = false, sync = false } = {}) {
            const url = pageUrl(params);
            const username = params.get('username');
            const createdUrl = svgUrl('created', params);
            const contributedUrl = svgUrl('contributed', params);

            showError('');
            if (push && url !== window.location.href) {
                window.history.pushState(null, '', url);
            }
            if (sync) {
                syncForm(params);
            }

            document.title = `GitHub Stats for ${username}`;
            byId('empty-state').hidden = true;
            byId('result-area').hidden = false;

            const sharePanel = byId('share-panel');
            sharePanel.dataset.createdUrl = createdUrl;
            sharePanel.dataset.contributedUrl = contributedUrl;
            updateSharePanel();
            updateShareButton(!sharePanel.hidden);

            loadSVG(createdUrl, 'created-svg', 'created repositories');
            loadSVG(contributedUrl, 'contributed-svg', 'contributed repositories');
        }

        function submitGenerator(event) {
            event.preventDefault();
            try {
                renderParams(readFormParams(), { push: true });
            } catch (error) {
                showError(error.message);
            }
        }

        async function copySnippet(button) {
            const item = button.closest('.share-item');
            const text = item.querySelector('code').textContent.trim();
            const state = item.querySelector('.copy-state');
            if (!text) {
                return;
            }

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.setAttribute('readonly', '');
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    textarea.remove();
                }
                button.textContent = 'Copied';
                state.textContent = 'Copied';
                setTimeout(() => {
                    button.textContent = 'Copy';
                    state.textContent = '';
                }, 2000);
            } catch (error) {
                console.error('Error copying snippet:', error);
                button.textContent = 'Failed';
                state.textContent = 'Copy failed';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const form = byId('generator-form');
            form.addEventListener('submit', submitGenerator);
            form.addEventListener('input', updateGenerateButton);
            setupSharePanel();

            const params = currentParams();
            if (params) {
                renderParams(params, { sync: true });
            } else {
                syncForm(null);
                renderIdle();
            }
        });

        window.addEventListener('popstate', () => {
            const params = currentParams();
            if (params) {
                renderParams(params, { sync: true });
            } else {
                syncForm(null);
                renderIdle();
            }
        });
    </script>
</head>
<body>
    <main class="page">
        <div class="topbar">
            <h1>GitHub Contribution Stats</h1>
            <a href="https://github.com/j178/github-contrib-stats" class="github-button" target="_blank" rel="noopener noreferrer">
                <svg class="github-icon" viewBox="0 0 16 16" version="1.1" aria-hidden="true">
                    <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                Star on GitHub
            </a>
        </div>

        <form id="generator-form" class="generator" novalidate>
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" spellcheck="false" required autofocus>
            </div>
            <div class="filter-controls" aria-label="Repository filters">
                <div class="field filter-field">
                    <div class="label-row">
                        <label for="max_repos">Top repos</label>
                        <span class="help-tip" tabindex="0" data-tooltip="Maximum number of repositories shown after sorting and filtering. Leave empty to show all." aria-label="Maximum number of repositories shown after sorting and filtering. Leave empty to show all."><svg class="help-tip-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.25"></circle><path d="M8 7.25v4"></path><path d="M8 4.75h.01"></path></svg></span>
                    </div>
                    <input type="number" id="max_repos" name="max_repos" min="1" step="1" inputmode="numeric" placeholder="All">
                </div>
                <div class="field filter-field">
                    <div class="label-row">
                        <label for="min_stars">Min stars</label>
                        <span class="help-tip" tabindex="0" data-tooltip="Only show repositories with at least this many stars." aria-label="Only show repositories with at least this many stars."><svg class="help-tip-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.25"></circle><path d="M8 7.25v4"></path><path d="M8 4.75h.01"></path></svg></span>
                    </div>
                    <input type="number" id="min_stars" name="min_stars" min="0" step="1" inputmode="numeric" placeholder="0">
                </div>
                <div class="field filter-field">
                    <div class="label-row">
                        <label for="min_forks">Min forks</label>
                        <span class="help-tip" tabindex="0" data-tooltip="Only show repositories with at least this many forks." aria-label="Only show repositories with at least this many forks."><svg class="help-tip-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.25"></circle><path d="M8 7.25v4"></path><path d="M8 4.75h.01"></path></svg></span>
                    </div>
                    <input type="number" id="min_forks" name="min_forks" min="0" step="1" inputmode="numeric" placeholder="0">
                </div>
                <div class="field filter-field">
                    <div class="label-row">
                        <label for="min_prs">Min PRs</label>
                        <span class="help-tip" tabindex="0" data-tooltip="Only show repositories with at least this many pull requests." aria-label="Only show repositories with at least this many pull requests."><svg class="help-tip-icon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.25"></circle><path d="M8 7.25v4"></path><path d="M8 4.75h.01"></path></svg></span>
                    </div>
                    <input type="number" id="min_prs" name="min_prs" min="0" step="1" inputmode="numeric" placeholder="0">
                </div>
            </div>
            <div class="generator-actions">
                <button id="generate-button" type="submit" class="generate-button">Generate</button>
                <button id="share-button" type="button" class="share-button" aria-controls="share-panel" aria-expanded="false" onclick="toggleSharePanel()" disabled>Share</button>
            </div>
            <p id="form-error" class="form-error" role="alert"></p>
        </form>

        <div id="empty-state" class="empty-state">
            <div>
                <strong>No profile generated</strong>
                <span>Ready</span>
            </div>
        </div>

        <section id="result-area" hidden>
            <div id="share-panel" class="share-panel" data-format="markdown" hidden>
                <div class="share-toolbar">
                    <div class="format-tabs" role="group" aria-label="Share format">
                        <button type="button" class="format-tab" data-format="markdown" aria-pressed="true" onclick="selectFormat(this)">Markdown</button>
                        <button type="button" class="format-tab" data-format="html" aria-pressed="false" onclick="selectFormat(this)">HTML</button>
                        <button type="button" class="format-tab" data-format="url" aria-pressed="false" onclick="selectFormat(this)">URL</button>
                    </div>
                </div>
                <div class="share-list">
                    <div class="share-item" data-kind="created">
                        <div class="share-item-header">
                            <h3 class="share-item-title">Created Repositories</h3>
                            <button type="button" class="copy-button" onclick="copySnippet(this)">Copy</button>
                        </div>
                        <pre class="snippet-box"><code></code></pre>
                        <span class="copy-state" aria-live="polite"></span>
                    </div>
                    <div class="share-item" data-kind="contributed">
                        <div class="share-item-header">
                            <h3 class="share-item-title">Contributed Repositories</h3>
                            <button type="button" class="copy-button" onclick="copySnippet(this)">Copy</button>
                        </div>
                        <pre class="snippet-box"><code></code></pre>
                        <span class="copy-state" aria-live="polite"></span>
                    </div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stats-column">
                    <div id="created-svg" class="svg-container" data-state="idle"></div>
                </div>

                <div class="stats-column">
                    <div id="contributed-svg" class="svg-container" data-state="idle"></div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
